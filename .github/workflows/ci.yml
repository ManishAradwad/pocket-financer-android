name: Pocket Financer CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Kotlin lint + detekt. Runs unconditionally for fast quality signal.
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Kotlin Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon || true
        # Soft-fail until ktlint is configured; hard-fail with ./gradlew ktlintCheck

  # ──────────────────────────────────────────────────────────────────────
  # Unit tests. Runs unconditionally.
  # ──────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --no-daemon

  # ──────────────────────────────────────────────────────────────────────
  # Android release build. Runs after lint + test pass. Produces a
  # signed APK with a dummy keystore (CI exercises the signing pipeline
  # without real credentials).
  # ──────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.3.13750724"

      - name: Generate CI keystore
        working-directory: app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore pocketfinancer-release-key.keystore \
            -alias pocketfinancer_key_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ci-dummy-password \
            -keypass ci-dummy-password \
            -dname "CN=CI Build, OU=CI, O=PocketFinancer, L=CI, S=CI, C=US"

      - name: Build release APK
        env:
          APP_RELEASE_STORE_PASSWORD: ci-dummy-password
          APP_RELEASE_KEY_PASSWORD: ci-dummy-password
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketfinancer-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7
