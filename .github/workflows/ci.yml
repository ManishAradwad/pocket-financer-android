name: Pocket Financer CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dkotlin.incremental=false
  NDK_VERSION: "27.3.13750724"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Verify the Gradle wrapper is present and the project resolves.
  # Fastest gate — runs first so broken builds fail immediately.
  # ──────────────────────────────────────────────────────────────────────
  verify-gradle:
    name: Verify Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "ERROR: gradlew not found — generate it with 'gradle wrapper'"
            exit 1
          fi
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "ERROR: gradle-wrapper.jar not found"
            exit 1
          fi
          chmod +x gradlew
          echo "Gradle wrapper OK"

  # ──────────────────────────────────────────────────────────────────────
  # Kotlin lint and static analysis. Runs unconditionally.
  # Soft-fail until ktlint is fully configured — warnings only.
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Kotlin Lint
    runs-on: ubuntu-latest
    continue-on-error: true  # soft-fail until ktlint is fully configured
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Gradle lint checks
        run: ./gradlew lintDebug --no-daemon --warning-mode all

  # ──────────────────────────────────────────────────────────────────────
  # Unit tests across all modules. Runs unconditionally.
  # ──────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --no-daemon --continue

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/reports/tests/**'
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────
  # Android release build (APK). Runs after lint + test pass.
  #
  # SDK setup: uses the pre-installed Android SDK on GitHub's ubuntu-latest
  # runner (located at $ANDROID_SDK_ROOT). The runner includes:
  #   - platforms;android-35 (we need 36, so we install it)
  #   - build-tools (we install 36.1.0)
  #   - cmdline-tools (for sdkmanager)
  # NDK: specified via ndkVersion in build.gradle.kts — AGP auto-downloads
  # the exact version if it is not cached.
  # ──────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: [verify-gradle, lint, test]
    if: |
      !cancelled() &&
      (needs.verify-gradle.result == 'success') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success')
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK components
        run: |
          # GitHub's ubuntu-latest has cmdline-tools and a base SDK.
          # Install the specific platform and build-tools we need.
          if [ -d "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          elif [ -d "${ANDROID_SDK_ROOT}/cmdline-tools/tools/bin" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/tools/bin/sdkmanager"
          else
            echo "cmdline-tools not found in expected location"
            exit 1
          fi

          echo "Installing SDK platform 36 and build-tools 36.1.0..."
          yes | $SDKMANAGER --install \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;${NDK_VERSION}" 2>&1 | tail -5

          echo "SDK components installed:"
          ls "${ANDROID_SDK_ROOT}/platforms/" 2>/dev/null || echo "  (no platforms dir)"
          ls "${ANDROID_SDK_ROOT}/build-tools/" 2>/dev/null || echo "  (no build-tools dir)"
          ls "${ANDROID_SDK_ROOT}/ndk/" 2>/dev/null || echo "  (no ndk dir)"

      - name: Generate CI keystore
        working-directory: app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore pocketfinancer-release-key.keystore \
            -alias pocketfinancer_key_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ci-dummy-password \
            -keypass ci-dummy-password \
            -dname "CN=CI Build, OU=CI, O=PocketFinancer, L=CI, S=CI, C=US"

      - name: Build release APK
        env:
          APP_RELEASE_STORE_PASSWORD: ci-dummy-password
          APP_RELEASE_KEY_PASSWORD: ci-dummy-password
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketfinancer-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: '**/build/reports/**'
          retention-days: 3
